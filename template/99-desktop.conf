# Desktop — compatibility, privacy, security
kernel.yama.ptrace_scope = 1
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.sysrq = 0

fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Permit user namespaces for containerized desktop apps
kernel.unprivileged_userns_clone = 1

# Allow unprivileged eBPF for desktop tooling
kernel.unprivileged_bpf_disabled = 0
net.core.bpf_jit_harden = 2

# ICMP and networking — enable IPv6 and ping for usability
net.ipv4.icmp_echo_ignore_all = 0
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0

# TCP behaviour: keep timestamps (better perf), conservative swappiness
net.ipv4.tcp_timestamps = 1
vm.swappiness = 10

# Reasonable defaults for local workloads
net.core.somaxconn = 128
net.core.netdev_max_backlog = 4096

# Moderate socket buffers
net.core.rmem_default = 262144
net.core.rmem_max = 4194304
net.core.wmem_default = 262144
net.core.wmem_max = 4194304
net.core.optmem_max = 65536

# TCP memory (min, default, max)
net.ipv4.tcp_rmem = 4096 131072 2097152
net.ipv4.tcp_wmem = 4096 131072 2097152

# UDP minimum buffers
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# Other desktop-friendly defaults
kernel.perf_event_paranoid = 2

