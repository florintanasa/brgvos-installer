101 "# Server — hardening + network tuning for throughput and resilience" on
102 "kernel.yama.ptrace_scope = 3" on
103 "kernel.kexec_load_disabled = 1" on
104 "kernel.kptr_restrict = 2" on
105 "kernel.dmesg_restrict = 1" on
106 "kernel.sysrq = 0" on
107 "dev.tty.ldisc_autoload = 0" on
108 "kernel.unprivileged_userns_clone = 0" on
109 "kernel.unprivileged_bpf_disabled = 1" on
110 "net.core.bpf_jit_harden = 2" on
111 "kernel.perf_event_paranoid = 3" on
112 "# SYN flood / TCP protections" on
113 "net.ipv4.tcp_syncookies = 1" on
114 "net.ipv4.tcp_rfc1337 = 1" on
115 "# ASLR / entropy for mmap" on
116 "vm.mmap_rnd_bits = 32" on
117 "vm.mmap_rnd_compat_bits = 16" on
118 "# Spoofing / ICMP redirects" on
119 "net.ipv4.conf.all.rp_filter = 1" on
120 "net.ipv4.conf.default.rp_filter = 1" on
121 "net.ipv4.conf.all.accept_redirects = 0" on
122 "net.ipv4.conf.default.accept_redirects = 0" on
123 "net.ipv4.conf.all.secure_redirects = 0" on
124 "net.ipv4.conf.default.secure_redirects = 0" on
125 "net.ipv4.conf.all.send_redirects = 0" on
126 "net.ipv4.conf.default.send_redirects = 0" on
127 "# ICMP echo: disable to reduce surface (set 1 to block)" on
128 "net.ipv4.icmp_echo_ignore_all = 1" on
129 "# Protect filesystems" on
130 "fs.protected_fifos = 2" on
131 "fs.protected_regular = 2" on
132 "fs.protected_symlinks = 1" on
133 "fs.protected_hardlinks = 1" on
134 "# Source route / redirects" on
135 "net.ipv4.conf.all.accept_source_route = 0" on
136 "net.ipv4.conf.default.accept_source_route = 0" on
137 "# TCP SACK: disable only if kernel is vulnerable; otherwise consider enabling" on
138 "net.ipv4.tcp_sack = 0" on
139 "net.ipv4.tcp_dsack = 0" on
140 "net.ipv4.tcp_fack = 0" on
141 "# IPv6: disable if not used; enable/configure if required" on
142 "net.ipv6.conf.all.disable_ipv6 = 1" on
143 "net.ipv6.conf.default.disable_ipv6 = 1" on
144 "net.ipv6.conf.lo.disable_ipv6 = 1" on
145 "net.ipv6.conf.default.router_solicitations = 0" on
146 "net.ipv6.conf.default.accept_ra_rtr_pref = 0" on
147 "net.ipv6.conf.default.accept_ra_pinfo = 0" on
148 "net.ipv6.conf.default.accept_ra_defrtr = 0" on
149 "net.ipv6.conf.all.accept_ra = 0" on
150 "net.ipv6.conf.default.accept_ra = 0" on
151 "net.ipv6.conf.default.autoconf = 0" on
152 "net.ipv6.conf.default.dad_transmits = 0" on
153 "net.ipv6.conf.default.max_addresses = 1" on
154 "# Privacy for IPv6 addresses (temporary addresses)" on
155 "net.ipv6.conf.all.use_tempaddr = 2" on
156 "net.ipv6.conf.default.use_tempaddr = 2" on
157 "# Prevent time leakage" on
158 "net.ipv4.tcp_timestamps = 0" on
159 "# Networking performance tuning" on
160 "net.core.netdev_max_backlog = 16384" on
161 "net.core.somaxconn = 8192" on
162 "net.core.rmem_default = 1048576" on
163 "net.core.rmem_max = 16777216" on
164 "net.core.wmem_default = 1048576" on
165 "net.core.wmem_max = 16777216" on
166 "net.core.optmem_max = 65536" on
167 "net.ipv4.tcp_rmem = 4096 1048576 2097152" on
168 "net.ipv4.tcp_wmem = 4096 65536 16777216" on
169 "net.ipv4.udp_rmem_min = 8192" on
170 "net.ipv4.udp_wmem_min = 8192" on
171 "net.ipv4.tcp_fastopen = 3" on
172 "net.ipv4.tcp_max_syn_backlog = 8192" on
173 "net.ipv4.tcp_max_tw_buckets = 2000000" on
174 "net.ipv4.tcp_tw_reuse = 1" on
175 "net.ipv4.tcp_fin_timeout = 10" on
176 "net.ipv4.tcp_slow_start_after_idle = 0" on
177 "net.ipv4.tcp_mtu_probing = 1" on
178 "# Swappiness tuned for servers - use more from 99% RAM and then from swap" on
179 "vm.swappiness = 1" on
