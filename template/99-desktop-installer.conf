1 "# Desktop — compatibility, privacy, security" on
2 "kernel.yama.ptrace_scope = 1" on
3 "kernel.kptr_restrict = 2" on
4 "kernel.dmesg_restrict = 1" on
5 "kernel.sysrq = 0" on
6 "fs.protected_symlinks = 1" on
7 "fs.protected_hardlinks = 1" on
8 "fs.protected_fifos = 2" on
9 "fs.protected_regular = 2" on
10 "# Permit user namespaces for containerized desktop apps" on
11 "kernel.unprivileged_userns_clone = 1" on
12 "# Allow unprivileged eBPF for desktop tooling" on
13 "kernel.unprivileged_bpf_disabled = 0" on
14 "net.core.bpf_jit_harden = 2" on
15 "# ICMP and networking — enable IPv6 and ping for usability" on
16 "net.ipv4.icmp_echo_ignore_all = 0" on
17 "net.ipv6.conf.all.disable_ipv6 = 0" on
18 "net.ipv6.conf.default.disable_ipv6 = 0" on
19 "# TCP behaviour: keep timestamps (better perf), conservative swappiness" on
20 "net.ipv4.tcp_timestamps = 1" on
21 "vm.swappiness = 10" on
22 "# Reasonable defaults for local workloads" on
23 "net.core.somaxconn = 128" on
24 "net.core.netdev_max_backlog = 4096" on
25 "# Moderate socket buffers" on
26 "net.core.rmem_default = 262144" on
27 "net.core.rmem_max = 4194304" on
28 "net.core.wmem_default = 262144" on
29 "net.core.wmem_max = 4194304" on
30 "net.core.optmem_max = 65536" on
31 "# TCP memory (min, default, max)" on
32 "net.ipv4.tcp_rmem = 4096 131072 2097152" on
33 "net.ipv4.tcp_wmem = 4096 131072 2097152" on
34 "# UDP minimum buffers" on
35 "net.ipv4.udp_rmem_min = 8192" on
36 "net.ipv4.udp_wmem_min = 8192" on
37 "# Other desktop-friendly defaults" on
38 "kernel.perf_event_paranoid = 2" on

